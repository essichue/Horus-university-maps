<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horus University Campus 3D Map</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    /* ══ LOGO-DRIVEN PREMIUM THEME (DEEP NAVY & HORUS GOLD) ══ */
    :root {
      --bg: #030f1e;
      --surface: #0a1b30;
      --surface2: #112643;
      --border: #1c3557;
      --border-glow: #caa23d; /* Horus Gold Glow */
      --accent: #caa23d;     /* Horus Gold Primary */
      --accent2: #f5d070;    /* Horus Gold Light Accent */
      --accent-glow: rgba(202, 162, 61, 0.25);
      --text: #e2ecf5;
      --text-dim: #8fa4b9;
      --muted: #526982;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 8px 32px rgba(0,0,0,0.6);
      --shadow-lg: 0 16px 64px rgba(0,0,0,0.8);
    }
    
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; overflow: hidden; }
    
    /* Responsive Application Shell Layout */
    #app-shell {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      position: relative;
    }

    #map { 
      position: absolute; 
      inset: 0; 
      transition: height 0.32s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ══ LOADING SCREEN ══ */
    #loading {
      position: absolute; inset: 0; z-index: 100;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity .6s ease;
    }
    #loading.fade-out { opacity: 0; pointer-events: none; }
    .load-logo-container {
      position: relative;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .load-brand-img {
      width: 120px;
      height: auto;
      z-index: 10;
    }
    .load-logo-ring {
      position: absolute; width: 160px; height: 160px; border-radius: 50%;
      border: 2px solid transparent; border-top-color: var(--accent);
      animation: spin .9s linear infinite;
    }

    .load-title {
      font-size: 24px; font-weight: 800; letter-spacing: .08em;
      color: var(--text); margin-bottom: 6px; text-transform: uppercase;
      text-shadow: 0 0 40px rgba(202, 162, 61, 0.4);
    }
    .load-sub {
      font-size: 11px; color: var(--accent); font-family: 'JetBrains Mono', monospace;
      letter-spacing: .14em; text-transform: uppercase; margin-bottom: 32px;
    }
    .load-bar-wrap {
      width: 200px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 14px;
    }
    .load-bar {
      height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent2));
      box-shadow: 0 0 8px var(--accent-glow); transition: width .3s ease;
    }
    .load-status { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══ HEADER ══ */
    #header {
      position: absolute; top: 18px; left: 18px; z-index: 40;
      background: rgba(3, 15, 30, 0.85); backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: 50px;
      padding: 8px 24px 8px 12px; display: flex; align-items: center; gap: 14px;
      box-shadow: var(--shadow); opacity: 0; animation: fadeUp .5s ease .3s forwards;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    
    .logo-wrapper {
      display: flex; align-items: center; justify-content: center;
      background: #fff; padding: 4px 8px; border-radius: 20px;
    }
    .brand-logo { height: 28px; width: auto; object-fit: contain; }
    
    .header-text { display: flex; flex-direction: column; }
    #header h1 { font-size: 14px; font-weight: 800; letter-spacing: .05em; color: var(--text); }
    #header span { font-size: 10px; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
    
    .drawer-trigger {
      background: var(--surface2); border: 1px solid var(--border); color: var(--accent);
      width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; cursor: pointer; transition: all 0.2s; font-size: 14px;
    }
    .drawer-trigger:hover { background: var(--accent); color: var(--bg); }

    /* ══ CONTROLS ══ */
    #controls {
      position: absolute; top: 18px; right: 18px; z-index: 40;
      display: flex; gap: 8px; opacity: 0; animation: fadeIn .5s ease .5s forwards;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .ctrl-group {
      background: rgba(3, 15, 30, 0.88); backdrop-filter: blur(16px);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      overflow: hidden; display: flex; box-shadow: var(--shadow);
    }
    .ctrl-btn {
      width: 40px; height: 40px; background: transparent; border: none;
      border-right: 1px solid var(--border); color: var(--text-dim);
      font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .15s; font-family: 'Syne', sans-serif; font-weight: 600; position: relative;
    }
    .ctrl-btn:last-child { border-right: none; }
    .ctrl-btn:hover { background: rgba(202, 162, 61, 0.15); color: var(--accent2); }

    /* ══ SIDE LIST DRAWER SYSTEM ══ */
    #side-drawer {
      position: absolute; left: -320px; top: 0; bottom: 0; width: 300px;
      z-index: 50; background: var(--surface); border-right: 1px solid var(--border);
      box-shadow: var(--shadow-lg); display: flex; flex-direction: column;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #side-drawer.open { transform: translateX(320px); }
    
    .drawer-header {
      padding: 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .drawer-header h2 { font-size: 14px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); }
    .drawer-close {
      background: transparent; border: none; color: var(--text-dim); font-size: 16px; cursor: pointer;
    }
    
    /* Search Bar Feature */
    .search-box-container { padding: 12px 20px; border-bottom: 1px solid var(--border); }
    .search-input {
      width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-family: 'Syne', sans-serif; font-size: 12px;
    }
    .search-input:focus { border-color: var(--accent); outline: none; }

    .legend-scroll { overflow-y: auto; flex: 1; padding: 10px 0; }
    .legend-scroll::-webkit-scrollbar { width: 4px; }
    .legend-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    
    .legend-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 20px;
      font-size: 12px; cursor: pointer; transition: all .15s; color: var(--text-dim);
    }
    .legend-item:hover { background: rgba(202, 162, 61, 0.08); color: var(--text); }
    .swatch { width: 12px; height: 12px; border-radius: 4px; flex-shrink: 0; }

    /* ══ POPUP WINDOW / DETAILS DRAWER ══ */
    #popup {
      position: absolute; z-index: 45; bottom: 24px; right: 24px;
      width: 330px; background: var(--surface); border: 1px solid var(--border-glow);
      border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-lg);
      display: none; flex-direction: column;
      animation: slideIn .3s cubic-bezier(.16,1,.3,1);
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    #popup .pop-img { width: 100%; height: 150px; object-fit: cover; display: block; }
    #popup .pop-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }
    #popup .pop-name { font-size: 16px; font-weight: 800; color: var(--text); letter-spacing: .02em; }
    #popup .pop-desc { font-size: 11px; color: var(--text-dim); line-height: 1.5; margin-bottom: 4px; }
    
    /* Structured Metadata Grid Fields */
    .metadata-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 4px;
    }
    .meta-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 8px 10px;
    }
    .meta-card .meta-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .meta-card .meta-val { font-size: 11px; font-weight: 700; color: var(--accent2); margin-top: 2px; line-height: 1.3; }
    .meta-card.full-width { grid-column: span 2; }

    #popup .pop-close {
      position: absolute; top: 12px; right: 12px; width: 28px; height: 28px; border-radius: 50%;
      background: rgba(3, 15, 30, 0.75); backdrop-filter: blur(8px); border: 1px solid var(--border);
      color: var(--text-dim); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    
    /* Navigation and Action Buttons */
    .action-row { display: flex; gap: 8px; margin-top: 10px; }
    .action-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 0; border: none; border-radius: 8px; font-size: 12px; font-weight: 700;
      font-family: 'Syne', sans-serif; cursor: pointer; transition: all .15s;
    }
    .btn-fly { background: linear-gradient(135deg, var(--accent) 0%, #a07a23 100%); color: var(--bg); }
    .btn-fly:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-web { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
    .btn-web:hover { background: var(--border); color: var(--accent2); }

    #hover-tip {
      position: absolute; z-index: 60; pointer-events: none;
      background: rgba(3, 15, 30, 0.95); border: 1px solid var(--border-glow);
      border-radius: 10px; overflow: hidden; display: none; width: 180px; box-shadow: var(--shadow);
    }
    #hover-tip .tip-body { padding: 8px 12px; }
    #hover-tip .tip-name { font-size: 11px; font-weight: 700; color: var(--text); }

    #coord-hud {
      position: absolute; bottom: 24px; left: 24px; z-index: 40;
      background: rgba(3, 15, 30, 0.85); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 14px;
      font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--muted);
    }
    #coord-hud span { color: var(--text-dim); }

    /* ══ RESPONSIVE MOBILE TRANSFORMS ══ */
    @media (max-width: 768px) {
      #map {
        position: relative;
        height: 50vh; /* Map constraints so it divides viewport layout cleanly */
        width: 100%;
      }
      
      #header { top: 10px; left: 10px; right: 10px; padding: 6px 14px 6px 8px; }
      #controls { top: auto; bottom: calc(50vh + 12px); right: 10px; }
      #coord-hud { display: none; }

      #side-drawer { width: 85%; max-width: 280px; left: -300px; }
      #side-drawer.open { transform: translateX(300px); }

      #popup {
        position: relative !important;
        inset: auto !important;
        width: 100% !important;
        height: 50vh !important;
        border-radius: 0;
        border: none;
        border-top: 2px solid var(--border-glow);
        background: var(--bg);
        overflow-y: auto;
        display: none;
      }
      #popup .pop-img { height: 140px; }
    }
  </style>
</head>

<div id="loading">

        <button class="action-btn btn-web" id="pop-web-btn">🌐 View Website</button>
      </div>
    </div>
  </div>
</div>

  type:"FeatureCollection",
  features: BUILDINGS.map((b, idx) => ({

let is3D = true;
let activeBuildingId = null;
let orbitAnimFrame = null;
let orbitActive = false;
let currentPopupId = null;

function getCentroid(coords) {
  let lngSum=0, latSum=0;
  coords.forEach(([lng,lat]) => { lngSum+=lng; latSum+=lat; });
  return [lngSum/coords.length, latSum/coords.length];
}

function easeInOutCubic(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }
function easeOutBack(t)   { const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); }
function easeOutCubic(t)  { return 1 - Math.pow(1-t, 3); }
function easeInCubic(t)   { return t*t*t; }

function buildFeatures(heightMap) {
  return BUILDINGS.map((bl, idx) => ({
    type:'Feature', id:idx,
    properties:{
      name:bl.name,
      height: heightMap[bl.id] !== undefined ? Math.max(0, heightMap[bl.id]) : bl.height,
      minHeight:0, color:bl.color, roofColor:bl.roofColor
    },
    geometry:{ type:'Polygon', coordinates:COORDS[bl.id] }
  }));
}

function setSpotlight(map, targetId) {
  if (targetId) {
    const idx = buildingMap[targetId].featureIndex;
    map.setPaintProperty('bldg-walls','fill-extrusion-color', ['case',['==',['id'],idx],['get','color'],'#0a1b30']);
    map.setPaintProperty('bldg-walls','fill-extrusion-opacity', ['case',['==',['id'],idx],0.95,0.15]);
    map.setPaintProperty('bldg-roof','fill-extrusion-color', ['case',['==',['id'],idx],['get','roofColor'],'#030f1e']);
  } else {
    map.setPaintProperty('bldg-walls','fill-extrusion-color',['get','color']);
    map.setPaintProperty('bldg-walls','fill-extrusion-opacity',0.92);
    map.setPaintProperty('bldg-roof','fill-extrusion-color',['get','roofColor']);
  }
}

function stopOrbit() {
  orbitActive = false;
  if (orbitAnimFrame) { cancelAnimationFrame(orbitAnimFrame); orbitAnimFrame = null; }
}

function startOrbit(map, lng, lat) {
  stopOrbit();
  orbitActive = true;
  const durationMs = 12000, totalDeg = 360;
  const startBearing = map.getBearing();
  let startTime = null;
  function step(ts) {
    if (!orbitActive) return;
    if (!startTime) startTime = ts;
    const t = Math.min((ts-startTime)/durationMs, 1);
    map.jumpTo({ bearing: startBearing + totalDeg * easeInOutCubic(t), center:[lng,lat] });
    if (t < 1) orbitAnimFrame = requestAnimationFrame(step);
    else orbitActive = false;
  }
  orbitAnimFrame = requestAnimationFrame(step);
}

let riseAnimFrame = null;
function stopRise() { if (riseAnimFrame) { cancelAnimationFrame(riseAnimFrame); riseAnimFrame = null; } }

function startFlyRise(map, id) {
  stopRise();
  const b = buildingMap[id];
  const targetH = b.height;
  const SINK_MS = 1000, COLLAPSE_MS = 400, RISE_MS = 1400;
  const startHeights = {};
  BUILDINGS.forEach(bl => { startHeights[bl.id] = bl.height; });

  let phase = 'sink';
  let phaseStart = null;

  function tick(ts) {
    if (!phaseStart) phaseStart = ts;
    const elapsed = ts - phaseStart;
    let heightMap = {};

    if (phase === 'sink') {
      const t = Math.min(elapsed / SINK_MS, 1);
      BUILDINGS.forEach(bl => {
        if (bl.id === id) heightMap[bl.id] = targetH;
        else heightMap[bl.id] = startHeights[bl.id] * (1 - easeOutCubic(t));
      });
      if (t >= 1) { phase = 'collapse'; phaseStart = ts; }
    } else if (phase === 'collapse') {
      const t = Math.min(elapsed / COLLAPSE_MS, 1);
      BUILDINGS.forEach(bl => { heightMap[bl.id] = bl.id === id ? targetH * (1 - easeInCubic(t)) : 0; });
      if (t >= 1) { phase = 'rise'; phaseStart = ts; }
    } else {
      const t = Math.min(elapsed / RISE_MS, 1);
      BUILDINGS.forEach(bl => { heightMap[bl.id] = bl.id === id ? targetH * easeOutBack(t) : 0; });
      if (t >= 1) {
        map.getSource('campus').setData({ type:'FeatureCollection', features: buildFeatures({ [id]: targetH, ...Object.fromEntries(BUILDINGS.filter(bl=>bl.id!==id).map(bl=>[bl.id,0])) }) });
        startOrbit(map, ...getCentroid(COORDS[id][0]));
        return;
      }
    }
    map.getSource('campus').setData({ type:'FeatureCollection', features: buildFeatures(heightMap) });
    riseAnimFrame = requestAnimationFrame(tick);
  }
  riseAnimFrame = requestAnimationFrame(tick);
}

function flyTo(map, id) {
  const b = buildingMap[id];
  if (!b) return;
  stopOrbit();
  stopRise();
  activeBuildingId = id;
  const [lng, lat] = getCentroid(COORDS[id][0]);
  const optimizedZoom = window.innerWidth <= 768 ? 17.5 : 18.2;

  map.flyTo({
    center:[lng, lat], zoom: optimizedZoom, pitch:65,
    bearing: map.getBearing() + 45, duration:2400, easing: easeInOutCubic
  });

  map.once('moveend', () => {
    if (activeBuildingId !== id) return;
    setSpotlight(map, id);
    startFlyRise(map, id);
  });
}

function resetView(map) {
  stopOrbit(); stopRise();
  activeBuildingId = null; currentPopupId = null;
  setSpotlight(map, null);
  map.getSource('campus').setData(GEOJSON);
  map.flyTo({ center:CAMPUS_CENTER, zoom: window.innerWidth <= 768 ? 15.8 : 16.5, pitch:50, bearing:-20, duration:1400 });
}

function showPopup(b) {
  currentPopupId = b.id;
  currentLinkTarget = b.link || "https://www.horus.edu.eg";
  
  document.getElementById('pop-img').src = b.image;
  document.getElementById('pop-name').textContent = b.name;
  document.getElementById('pop-desc').textContent = b.desc;
  document.getElementById('pop-height').textContent = b.height + " meters";
  document.getElementById('pop-floors').textContent = Math.round(b.height / 4);
  document.getElementById('pop-est').textContent = b.established || "N/A";
  document.getElementById('pop-capacity').textContent = b.capacity || "N/A";
  document.getElementById('pop-depts').textContent = b.depts || "General Campus Access Infrastructure Point";

  document.getElementById('popup').style.display = 'flex';
}

function renderDirectoryList(map, items) {
  const legendEl = document.getElementById('legend-items');
  legendEl.innerHTML = '';
  items.forEach(b => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="swatch" style="background:${b.color}"></div><span>${b.name}</span>`;
    item.addEventListener('click', () => { 
      flyTo(map, b.id); 
      showPopup(b); 
      if(window.innerWidth <= 768) {
        document.getElementById('side-drawer').classList.remove('open');
      }
    });
    legendEl.appendChild(item);
  });
}

        clearInterval(progressTimer);

    }, 150);

    }});

    }, paint:{ 'text-color':'#e2ecf5','text-halo-color':'#030f1e','text-halo-width':2 }});

    renderDirectoryList(map, BUILDINGS);

    // Search Engine Filter
    document.getElementById('search-input').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const matching = BUILDINGS.filter(b => b.name.toLowerCase().includes(term) || b.depts.toLowerCase().includes(term));
      renderDirectoryList(map, matching);
    });

    map.on('move', () => {
      const center = map.getCenter();
      document.getElementById('hud-lat').textContent = center.lat.toFixed(4);
      document.getElementById('hud-lng').textContent = center.lng.toFixed(4);
    });

    const hoverTip = document.getElementById('hover-tip');
    ['bldg-walls','bldg-roof'].forEach(layer => {
      map.on('mousemove', layer, e => {
        map.getCanvas().style.cursor = 'pointer';
        const b = BUILDINGS[e.features[0].id];
        if (!b) return;
        document.getElementById('ht-name').textContent = b.name;
        hoverTip.style.display = 'block';
        hoverTip.style.left = (e.point.x + 12) + 'px';
        hoverTip.style.top = (e.point.y - 45) + 'px';
      });

      map.on('mouseleave', layer, () => {
        map.getCanvas().style.cursor = '';
        hoverTip.style.display = 'none';
      });

      map.on('click', layer, e => {
        const b = BUILDINGS[e.features[0].id];

    document.getElementById('drawer-open-btn').addEventListener('click', () => {

    document.getElementById('pop-web-btn').addEventListener('click', () => {

  });
