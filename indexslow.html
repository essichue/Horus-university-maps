<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horus University Campus 3D Map</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    /* ══ LOGO-DRIVEN PREMIUM THEME (DEEP NAVY & HORUS GOLD) ══ */
    :root {
      --bg: #030f1e;
      --surface: #0a1b30;
      --surface2: #112643;
      --border: #1c3557;
      --border-glow: #caa23d; /* Horus Gold Glow */
      --accent: #caa23d;     /* Horus Gold Primary */
      --accent2: #f5d070;    /* Horus Gold Light Accent */
      --accent-glow: rgba(202, 162, 61, 0.25);
      --text: #e2ecf5;
      --text-dim: #8fa4b9;
      --muted: #526982;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 8px 32px rgba(0,0,0,0.6);
      --shadow-lg: 0 16px 64px rgba(0,0,0,0.8);
    }
    

     /* ══ LOADING SCREEN ══ */
    #loading {
      position: fixed; inset: 0; z-index: 100;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0;
      transition: opacity .6s ease, transform .6s ease;
    }
    #loading.fade-out { opacity: 0; transform: scale(1.05); pointer-events: none; }

    .load-logo-wrap {
      width: 80px; height: 80px; margin-bottom: 24px;
      position: relative; display: flex; align-items: center; justify-content: center;
    }
    .load-logo-wrap img { width: 64px; height: 64px; object-fit: contain; filter: drop-shadow(0 0 20px var(--gold-glow)); }
    .load-logo-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid transparent; border-top-color: var(--gold);
      animation: spin 1s linear infinite;
    }
    .load-logo-ring2 {
      position: absolute; inset: 8px; border-radius: 50%;
      border: 2px solid transparent; border-bottom-color: var(--sky);
      animation: spin 1.6s linear infinite reverse;
    }

    .load-title {
      font-size: 20px; font-weight: 800; letter-spacing: .06em;
      color: var(--text); margin-bottom: 4px;
    }
    .load-sub {
      font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace;
      letter-spacing: .12em; text-transform: uppercase; margin-bottom: 28px;
    }
    .load-bar-wrap {
      width: 180px; height: 3px;
      background: var(--border); border-radius: 3px; overflow: hidden;
      margin-bottom: 12px;
    }
    .load-bar {
      height: 100%; width: 0%; border-radius: 3px;
      background: linear-gradient(90deg, var(--gold), var(--sky));
      box-shadow: 0 0 10px var(--gold-glow);
      transition: width .3s ease;
    }
    .load-status {
      font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace;
      letter-spacing: .06em;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; overflow: hidden; }
    
    /* Responsive Application Shell Layout */
    #app-shell {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      position: relative;
    }

    #map-wrap {
      flex: 1; position: relative; min-height: 0;
      border-bottom: 1px solid var(--border);
    }
    #map { position: absolute; inset: 0; }

    /* ══ WELCOME TYPING OVERLAY ══ */
    #welcome-overlay {
      position: absolute; inset: 0; z-index: 60;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; background: transparent;
    }
    #welcome-overlay .welcome-box {
      display: flex; flex-direction: column; align-items: center;
      background: rgba(10, 27, 48, 0.55);
      backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(202, 162, 61, 0.35);
      border-radius: 24px;
      padding: 40px 64px;
      margin-top: clamp(46px, 7vw, 96px);
      box-shadow: var(--shadow-lg), 0 0 60px rgba(202,162,61,0.12);
      opacity: 0; transform: translateY(10px) scale(0.98);
      transition: opacity .7s ease, transform .7s ease;
    }
    #welcome-overlay.visible .welcome-box { opacity: 1; transform: translateY(0) scale(1); }
    #welcome-overlay.fade-out .welcome-box { opacity: 0; transition: opacity .9s ease; }
    #welcome-overlay .welcome-text {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: clamp(24px, 4.6vw, 52px);
      color: var(--text); letter-spacing: .04em; text-align: center;
      text-shadow: 0 0 30px rgba(202,162,61,0.55), 0 0 80px rgba(202,162,61,0.25);
    }
    #welcome-overlay .welcome-cursor {
      display: inline-block; width: 3px; height: 1em; margin-left: 4px;
      background: var(--accent2); vertical-align: -0.15em;
      animation: blinkCursor .8s step-end infinite;
    }
    @keyframes blinkCursor { 50% { opacity: 0; } }
    #welcome-overlay .welcome-crumb {
      font-family: 'JetBrains Mono', monospace; font-weight: 500;
      font-size: clamp(11px, 1.3vw, 15px);
      letter-spacing: .08em;
      color: var(--accent2);
      min-height: 1.4em;
      margin-bottom: 10px;
      text-align: center;
      max-width: 60vw;
    }
    #welcome-overlay .welcome-crumb:empty { margin-bottom: 0; }
      margin-top: 16px;
      font-family: 'JetBrains Mono', monospace; font-weight: 500;
      font-size: clamp(10px, 1.2vw, 13px);
      letter-spacing: .3em; text-transform: uppercase;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 20%, #fff 40%, var(--accent2) 60%, var(--accent) 100%);
      background-size: 250% auto;
      -webkit-background-clip: text; background-clip: text; color: transparent;
      opacity: 0; transform: translateY(10px);
      transition: opacity 1.1s ease, transform 1.1s ease;
    }
    #welcome-overlay .welcome-sub::before,
    #welcome-overlay .welcome-sub::after {
      content: ''; display: inline-block; width: 18px; height: 1px;
      background: var(--accent); vertical-align: middle; opacity: .6;
    }
    #welcome-overlay .welcome-sub::before { margin-right: 10px; }
    #welcome-overlay .welcome-sub::after { margin-left: 10px; }
    #welcome-overlay.sub-visible .welcome-sub {
      opacity: 1; transform: translateY(0);
      animation: shimmerSub 4s linear .2s infinite;
    }
    @keyframes shimmerSub {
      0% { background-position: 250% center; }
      100% { background-position: -250% center; }
    }

    #intro-skip-btn {
      position: absolute; z-index: 60; bottom: 28px; right: 28px;
      background: rgba(10, 27, 48, 0.5); backdrop-filter: blur(14px);
      border: 1px solid rgba(202,162,61,0.35); color: var(--accent2);
      font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: .08em;
      padding: 9px 18px; border-radius: 30px; cursor: pointer;
      opacity: 0; pointer-events: none; transform: translateY(6px);
      transition: opacity .5s ease, transform .5s ease, background .2s ease;
    }
    #intro-skip-btn.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
    #intro-skip-btn:hover { background: rgba(202,162,61,0.18); }


  

    /* ══ HEADER ══ */
    #header {
      position: absolute; top: 18px; left: 18px; z-index: 40;
      background: rgba(3, 15, 30, 0.85); backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: 50px;
      padding: 8px 24px 8px 12px; display: flex; align-items: center; gap: 14px;
      box-shadow: var(--shadow); opacity: 0; animation: fadeUp .5s ease .3s forwards;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    
    .logo-wrapper {
      display: flex; align-items: center; justify-content: center;
      background: #fff; padding: 4px 8px; border-radius: 20px;
    }
    .brand-logo { height: 28px; width: auto; object-fit: contain; }
    
    .header-text { display: flex; flex-direction: column; }
    #header h1 { font-size: 14px; font-weight: 800; letter-spacing: .05em; color: var(--text); }
    #header span { font-size: 10px; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
    
    .drawer-trigger {
      background: var(--surface2); border: 1px solid var(--border); color: var(--accent);
      width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; cursor: pointer; transition: all 0.2s; font-size: 14px;
    }
    .drawer-trigger:hover { background: var(--accent); color: var(--bg); }

    /* ══ CONTROLS ══ */
    #controls {
      position: absolute; top: 18px; right: 18px; z-index: 40;
      display: flex; gap: 8px; opacity: 0; animation: fadeIn .5s ease .5s forwards;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .ctrl-group {
      background: rgba(3, 15, 30, 0.88); backdrop-filter: blur(16px);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      overflow: hidden; display: flex; box-shadow: var(--shadow);
    }
    .ctrl-btn {
      width: 40px; height: 40px; background: transparent; border: none;
      border-right: 1px solid var(--border); color: var(--text-dim);
      font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .15s; font-family: 'Syne', sans-serif; font-weight: 600; position: relative;
    }
    .ctrl-btn:last-child { border-right: none; }
    .ctrl-btn:hover { background: rgba(202, 162, 61, 0.15); color: var(--accent2); }

    /* ══ SIDE LIST DRAWER SYSTEM ══ */
    #side-drawer {
      position: absolute; left: -320px; top: 0; bottom: 0; width: 300px;
      z-index: 50; background: var(--surface); border-right: 1px solid var(--border);
      box-shadow: var(--shadow-lg); display: flex; flex-direction: column;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #side-drawer.open { transform: translateX(320px); }
    
    .drawer-header {
      padding: 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .drawer-header h2 { font-size: 14px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); }
    .drawer-close {
      background: transparent; border: none; color: var(--text-dim); font-size: 16px; cursor: pointer;
    }
    
    /* Search Bar Feature */
    .search-box-container { padding: 12px 20px; border-bottom: 1px solid var(--border); }
    .search-input {
      width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-family: 'Syne', sans-serif; font-size: 12px;
    }
    .search-input:focus { border-color: var(--accent); outline: none; }

    .legend-scroll { overflow-y: auto; flex: 1; padding: 10px 0; }
    .legend-scroll::-webkit-scrollbar { width: 4px; }
    .legend-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    
    .legend-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 20px;
      font-size: 12px; cursor: pointer; transition: all .15s; color: var(--text-dim);
    }
    .legend-item:hover { background: rgba(202, 162, 61, 0.08); color: var(--text); }
    .swatch { width: 12px; height: 12px; border-radius: 4px; flex-shrink: 0; }

    /* ══ POPUP WINDOW / DETAILS DRAWER ══ */
    #popup {
      position: absolute; z-index: 45; bottom: 24px; right: 24px;
      width: 330px; background: var(--surface); border: 1px solid var(--border-glow);
      border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-lg);
      display: none; flex-direction: column;
      animation: slideIn .3s cubic-bezier(.16,1,.3,1);
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    #popup .pop-img { width: 100%; height: 150px; object-fit: cover; display: block; }
    #popup .pop-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }
    #popup .pop-name { font-size: 16px; font-weight: 800; color: var(--text); letter-spacing: .02em; }
    #popup .pop-desc { font-size: 11px; color: var(--text-dim); line-height: 1.5; margin-bottom: 4px; }
    
    /* Structured Metadata Grid Fields */
    .metadata-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 4px;
    }
    .meta-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 8px 10px;
    }
    .meta-card .meta-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .meta-card .meta-val { font-size: 11px; font-weight: 700; color: var(--accent2); margin-top: 2px; line-height: 1.3; }
    .meta-card.full-width { grid-column: span 2; }

    #popup .pop-close {
      position: absolute; top: 12px; right: 12px; width: 28px; height: 28px; border-radius: 50%;
      background: rgba(3, 15, 30, 0.75); backdrop-filter: blur(8px); border: 1px solid var(--border);
      color: var(--text-dim); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    
    /* Navigation and Action Buttons */
    .action-row { display: flex; gap: 8px; margin-top: 10px; }
    .action-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 0; border: none; border-radius: 8px; font-size: 12px; font-weight: 700;
      font-family: 'Syne', sans-serif; cursor: pointer; transition: all .15s;
    }
    .btn-fly { background: linear-gradient(135deg, var(--accent) 0%, #a07a23 100%); color: var(--bg); }
    .btn-fly:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-web { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
    .btn-web:hover { background: var(--border); color: var(--accent2); }

    #hover-tip {
      position: absolute; z-index: 60; pointer-events: none;
      background: rgba(3, 15, 30, 0.95); border: 1px solid var(--border-glow);
      border-radius: 10px; overflow: hidden; display: none; width: 180px; box-shadow: var(--shadow);
    }
    #hover-tip .tip-body { padding: 8px 12px; }
    #hover-tip .tip-name { font-size: 11px; font-weight: 700; color: var(--text); }

    #coord-hud {
      position: absolute; bottom: 24px; left: 24px; z-index: 40;
      background: rgba(3, 15, 30, 0.85); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 14px;
      font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--muted);
    }
    #coord-hud span { color: var(--text-dim); }

    .dept-card { padding: 10px 12px !important; }
    .dept-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .dept-tag {
      display: inline-block; padding: 3px 9px; border-radius: 20px;
      font-size: 9.5px; font-weight: 600; letter-spacing: .04em;
      background: linear-gradient(135deg, rgba(202,162,61,0.18), rgba(202,162,61,0.08));
      border: 1px solid rgba(202,162,61,0.35);
      color: var(--accent2); line-height: 1.5; white-space: nowrap;
    }

    /* ══ ESSIC DRONE ══ */
    #essic-drone-wrap {
      position: absolute;
      top: 72px; left: auto; right: 72px;
      z-index: 45;
      pointer-events: auto;
      cursor: pointer;
      transform-origin: center center;
      animation: droneHover 2.8s ease-in-out infinite;
      /* smooth repositioning when flying to building */
      transition: top 4.2s cubic-bezier(.4,0,.2,1), left 4.2s cubic-bezier(.4,0,.2,1), right 0.1s;
    }
    #essic-drone-wrap.flying-to-building {
      animation: droneFlyForward 4.2s ease-in-out forwards;
    }
    #essic-drone-wrap.orbiting-building {
      animation: droneOrbitBob 1.8s ease-in-out infinite;
    }
    #essic-drone-wrap.hovering {
      animation: droneHover 2.8s ease-in-out infinite;
    }
    /* Old flying class kept for backward compat */
    #essic-drone-wrap.flying {
      animation: droneFlyForward 0.4s ease forwards;
    }
    @keyframes droneHover {
      0%,100% { transform: translateY(0px) rotate(0deg); }
      30%      { transform: translateY(-7px) rotate(1deg); }
      70%      { transform: translateY(-4px) rotate(-1deg); }
    }
    @keyframes droneFlyForward {
      0%   { transform: translateY(0px) rotate(0deg) scale(1); }
      15%  { transform: translateY(-22px) rotate(-14deg) scale(1.08); }
      55%  { transform: translateY(-18px) rotate(-10deg) scale(1.05); }
      85%  { transform: translateY(-10px) rotate(-4deg) scale(1.02); }
      100% { transform: translateY(-6px) rotate(0deg) scale(1); }
    }
    @keyframes droneOrbitBob {
      0%,100% { transform: translateY(0px) rotate(0deg) scale(1); }
      25%     { transform: translateY(-8px) rotate(3deg) scale(1.04); }
      75%     { transform: translateY(-4px) rotate(-3deg) scale(0.98); }
    }
    /* Drone parked above the welcome card, gently bobbing while it "presents" the message */
    #essic-drone-wrap.welcome-hover-bob {
      animation: droneWelcomeBob 3.2s ease-in-out infinite;
    }
    @keyframes droneWelcomeBob {
      0%,100% { transform: translate(-50%, -50%) scale(1) translateY(0); }
      50%     { transform: translate(-50%, -50%) scale(1) translateY(-9px); }
    }
    /* Soft downward light beam — the drone "beaming" the welcome message onto the card */
    #essic-drone-wrap.welcome-beacon::after {
      content: '';
      position: absolute; left: 50%; top: 88%;
      width: 5px; height: 220px;
      transform: translateX(-50%);
      background: linear-gradient(to bottom, rgba(202,162,61,0.6), rgba(202,162,61,0.08) 55%, rgba(202,162,61,0));
      filter: blur(4px);
      pointer-events: none; z-index: -1;
      animation: beaconPulse 2.6s ease-in-out infinite;
    }
    @keyframes beaconPulse { 0%,100% { opacity: .45; } 50% { opacity: 1; } }
    /* Orbit ring indicator shown when drone is orbiting */
    #drone-orbit-ring {
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      border: 1.5px dashed rgba(202,162,61,0.5);
      pointer-events: none;
      opacity: 0;
      animation: none;
      transform: scale(0.6);
      transition: opacity 0.4s, transform 0.4s;
    }
    #essic-drone-wrap.orbiting-building #drone-orbit-ring {
      opacity: 1;
      transform: scale(1);
      animation: orbitRingSpin 6s linear infinite;
    }
    @keyframes orbitRingSpin {
      to { transform: rotate(360deg) scale(1); }
    }
    /* Speed lines behind drone during flight */
    #drone-speed-lines {
      position: absolute;
      right: 100%; top: 50%;
      transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 5px;
      opacity: 0; transition: opacity 0.2s;
      pointer-events: none;
    }
    #essic-drone-wrap.flying-to-building #drone-speed-lines { opacity: 1; }
    .speed-line {
      height: 2px; border-radius: 2px;
      background: linear-gradient(to left, rgba(202,162,61,0.6), transparent);
      animation: speedLineAnim 0.4s ease-in-out infinite alternate;
    }
    .speed-line:nth-child(1) { width: 28px; animation-delay: 0s; }
    .speed-line:nth-child(2) { width: 18px; animation-delay: 0.1s; }
    .speed-line:nth-child(3) { width: 22px; animation-delay: 0.05s; }
    @keyframes speedLineAnim {
      from { width: 10px; opacity: 0.4; }
      to   { opacity: 0.9; }
    }

    .drone-svg-body { display: block; }

    /* Rotor spin */
    .rotor { transform-origin: center center; animation: rotorSpin 0.18s linear infinite; }
    .rotor-slow { transform-origin: center center; animation: rotorSpin 0.28s linear infinite; }
    @keyframes rotorSpin { to { transform: rotate(360deg); } }

    /* ESSIC logo tag hanging below drone */
    #drone-logo-tag {
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto;
      width: 88px;
      background: #fff;
      border-radius: 7px;
      border: 1.5px solid #d0d0d0;
      box-shadow: 0 3px 12px rgba(0,0,0,0.35);
      padding: 3px 5px;
      position: relative;
    }
    #drone-logo-tag::before {
      content: '';
      position: absolute;
      top: -12px; left: 50%; transform: translateX(-50%);
      width: 1px; height: 12px;
      background: rgba(150,150,150,0.7);
      box-shadow: 1px 0 0 rgba(180,180,180,0.4);
    }
    #drone-logo-tag img { width: 78px; height: auto; display: block; }

    /* Drone tooltip */
    #drone-tooltip {
      position: absolute;
      bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%);
      background: rgba(2,12,24,0.92); backdrop-filter: blur(8px);
      border: 1px solid rgba(202,162,61,0.5);
      color: #f5d070; font-size: 9px; font-family: 'JetBrains Mono', monospace;
      letter-spacing: .06em; white-space: nowrap;
      padding: 4px 9px; border-radius: 5px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    #essic-drone-wrap:hover #drone-tooltip { opacity: 1; }

    /* ══ RESPONSIVE MOBILE TRANSFORMS ══ */
    @media (max-width: 768px) {
      #map {
        position: absolute;
        inset: 0;
        height: 100%;
        width: 100%;
      }
      /* #map-wrap { flex: 1; border-right: 1px solid var(--border); border-bottom: none; } */
      
      #header { top: 10px; left: 10px; right: 10px; padding: 6px 14px 6px 8px; }
      #controls { top: auto; bottom: 16px; right: 10px; }
      #coord-hud { display: none; }

      #side-drawer { width: 85%; max-width: 280px; left: -300px; }
      #side-drawer.open { transform: translateX(300px); }

      #popup {
        position: absolute !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        top: auto !important;
        width: 100% !important;
        height: 46vh !important;
        border-radius: 0;
        border: none;
        border-top: 2px solid var(--border-glow);
        background: var(--bg);
        overflow-y: auto;
        display: none;
      }
      #popup .pop-img { height: 140px; }
    }
  </style>

function getCentroid(coords) {
  let lngSum=0, latSum=0;

  return [lngSum/coords.length, latSum/coords.length];
}

function easeInOutCubic(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }
function easeOutBack(t)   { const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); }
function easeOutCubic(t)  { return 1 - Math.pow(1-t, 3); }
function easeInCubic(t)   { return t*t*t; }

function buildFeatures(heightMap) {
  return BUILDINGS.map((bl, idx) => ({
    type:'Feature', id:idx,
    properties:{
      name:bl.name,
      height: heightMap[bl.id] !== undefined ? Math.max(0, heightMap[bl.id]) : bl.height,
      minHeight:0, color:bl.color, roofColor:bl.roofColor
    },
    geometry:{ type:'Polygon', coordinates:COORDS[bl.id] }
  }));
}

function setSpotlight(map, targetId) {
  if (targetId) {
    const idx = buildingMap[targetId].featureIndex;
    map.setPaintProperty('bldg-walls','fill-extrusion-color', ['case',['==',['id'],idx],['get','color'],'#0a1b30']);
    map.setPaintProperty('bldg-walls','fill-extrusion-opacity', ['case',['==',['id'],idx],0.95,0.15]);
    map.setPaintProperty('bldg-roof','fill-extrusion-color', ['case',['==',['id'],idx],['get','roofColor'],'#030f1e']);
  } else {
    map.setPaintProperty('bldg-walls','fill-extrusion-color',['get','color']);
    map.setPaintProperty('bldg-walls','fill-extrusion-opacity',0.92);
    map.setPaintProperty('bldg-roof','fill-extrusion-color',['get','roofColor']);
  }
}

function stopOrbit() {
  orbitActive = false;
  if (orbitAnimFrame) { cancelAnimationFrame(orbitAnimFrame); orbitAnimFrame = null; }
}

function startOrbit(map, lng, lat) {
  stopOrbit();
  orbitActive = true;
  const degreesPerMs = 360 / 60000; // 1 full rotation every 60 seconds (very slow)
  const startBearing = map.getBearing();
  let startTime = null;
  function step(ts) {
    if (!orbitActive) return;
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    const bearing = startBearing + degreesPerMs * elapsed;
    map.jumpTo({ bearing: bearing, center:[lng, lat] });
    orbitAnimFrame = requestAnimationFrame(step); // continuous, never stops
  }
  orbitAnimFrame = requestAnimationFrame(step);
}

let riseAnimFrame = null;
function stopRise() { if (riseAnimFrame) { cancelAnimationFrame(riseAnimFrame); riseAnimFrame = null; } }

function startFlyRise(map, id) {
  stopRise();
  const b = buildingMap[id];
  const targetH = b.height;
  const SINK_MS = 1000, COLLAPSE_MS = 400, RISE_MS = 1400;
  const startHeights = {};
  BUILDINGS.forEach(bl => { startHeights[bl.id] = bl.height; });

  let phase = 'sink';
  let phaseStart = null;

  function tick(ts) {
    if (!phaseStart) phaseStart = ts;
    const elapsed = ts - phaseStart;
    let heightMap = {};

    if (phase === 'sink') {
      const t = Math.min(elapsed / SINK_MS, 1);
      BUILDINGS.forEach(bl => {
        if (bl.id === id) heightMap[bl.id] = targetH;
        else heightMap[bl.id] = startHeights[bl.id] * (1 - easeOutCubic(t));
      });
      if (t >= 1) { phase = 'collapse'; phaseStart = ts; }
    } else if (phase === 'collapse') {
      const t = Math.min(elapsed / COLLAPSE_MS, 1);
      BUILDINGS.forEach(bl => { heightMap[bl.id] = bl.id === id ? targetH * (1 - easeInCubic(t)) : 0; });
      if (t >= 1) { phase = 'rise'; phaseStart = ts; }
    } else {
      const t = Math.min(elapsed / RISE_MS, 1);
      BUILDINGS.forEach(bl => { heightMap[bl.id] = bl.id === id ? targetH * easeOutBack(t) : 0; });
      if (t >= 1) {
        map.getSource('campus').setData({ type:'FeatureCollection', features: buildFeatures({ [id]: targetH, ...Object.fromEntries(BUILDINGS.filter(bl=>bl.id!==id).map(bl=>[bl.id,0])) }) });
        startOrbit(map, ...getCentroid(COORDS[id][0]));
        return;
      }
    }
    map.getSource('campus').setData({ type:'FeatureCollection', features: buildFeatures(heightMap) });
    riseAnimFrame = requestAnimationFrame(tick);
  }
  riseAnimFrame = requestAnimationFrame(tick);
}

function flyTo(map, id) {
  const b = buildingMap[id];
  if (!b) return;
  stopOrbit();
  stopRise();
  activeBuildingId = id;
  const [lng, lat] = getCentroid(COORDS[id][0]);
  const optimizedZoom = isMobileView() ? 17.0 : 17.7;

  map.flyTo({
    center:[lng, lat], zoom: optimizedZoom, pitch:65,
    bearing: map.getBearing() + 45, duration:5000, padding:getBuildingFocusPadding(), easing: easeInOutCubic
  });

  map.once('moveend', () => {
    if (activeBuildingId !== id) return;
    setSpotlight(map, id);
    startFlyRise(map, id);
  });
}

function resetView(map) {
  stopOrbit(); stopRise();
  activeBuildingId = null; currentPopupId = null;
  setSpotlight(map, null);
  map.getSource('campus').setData(GEOJSON);
  map.flyTo({ center:CAMPUS_CENTER, zoom:getCampusZoom(), pitch:50, bearing:-20, padding:getCampusPadding(), duration:1400 });
}

function zoomOutAfterBuildingOrbit(map, id) {
  if (activeBuildingId !== id) return;
  stopOrbit();
  stopRise();
  activeBuildingId = null;
  setSpotlight(map, null);
  map.getSource('campus').setData(GEOJSON);
  map.flyTo({
    center:CAMPUS_CENTER,
    zoom:getCampusZoom(),
    pitch:50,
    bearing:-20,
    padding:getBuildingFocusPadding(),
    duration:2400,
    easing:easeInOutCubic
  });
}

function showPopup(b) {
  currentPopupId = b.id;
  currentLinkTarget = b.link || "https://www.horus.edu.eg";
  
  document.getElementById('pop-img').src = b.image;
  document.getElementById('pop-name').textContent = b.name;
  document.getElementById('pop-desc').textContent = b.desc;
  document.getElementById('pop-height').textContent = b.height + " meters";
  document.getElementById('pop-floors').textContent = Math.round(b.height / 4);
  document.getElementById('pop-est').textContent = b.established || "N/A";
  document.getElementById('pop-capacity').textContent = b.capacity || "N/A";
  const deptsRaw = b.depts || "General Campus Access Infrastructure Point";
  const deptsEl = document.getElementById('pop-depts');
  const deptList = deptsRaw.split(',').map(d => d.trim()).filter(Boolean);
  deptsEl.innerHTML = deptList.map(d => `<span class="dept-tag">${d}</span>`).join('');

  document.getElementById('popup').style.display = 'flex';
}

function renderDirectoryList(map, items) {
  const legendEl = document.getElementById('legend-items');
  legendEl.innerHTML = '';
  items.forEach(b => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="swatch" style="background:${b.color}"></div><span>${b.name}</span>`;
    item.addEventListener('click', () => { 
      flyTo(map, b.id); 
      showPopup(b); window.triggerDroneFly && window.triggerDroneFly(b.id); 
      if(window.innerWidth <= 768) {
        document.getElementById('side-drawer').classList.remove('open');
      }
    });
    legendEl.appendChild(item);
  });
}

window.addEventListener('DOMContentLoaded', () => {
  const map = new maplibregl.Map({
    container:'map',
    style:{
      version:8,
      glyphs:'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
      transition: { duration: 2200, delay: 0 },
      sources:{ osm:{ type:'raster', tiles:['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'], tileSize:256, attribution:'© Horus University Maps' } },
      layers:[
        { id:'bg', type:'background', paint:{'background-color':'#030f1e'} },
        { id:'tiles', type:'raster', source:'osm', paint:{'raster-opacity':1,'raster-saturation':0,'raster-brightness-min':0} }
      ]
    },
    minZoom:0, maxZoom:20,
    projection:'globe',
    center:[CAMPUS_CENTER[0], 15], zoom:0.5, pitch:0, bearing:0, antialias:true
  });

  const WORLD_MASK = {
    type:"FeatureCollection",
    features:[{ type:"Feature", properties:{}, geometry:{ type:"Polygon", coordinates:[
      [[-180,-90],[180,-90],[180,90],[-180,90],[-180,-90]],
      [[31.658771,31.4512259],[31.6549304,31.450346],[31.6560799,31.446708],[31.6597999,31.4474533],[31.658771,31.4512259]]
    ]}}]
  };

  map.on('load', () => {
    // Atmosphere styling for the full-earth globe view
    map.setSky({
      'sky-color': '#0a1b30',
      'sky-horizon-blend': 0.5,
      'horizon-color': '#112643',
      'horizon-fog-blend': 0.5,
      'fog-color': '#caa23d',
      'fog-ground-blend': 0.5
    });

    // Returning visitors within the same session skip straight to the settled campus view
    const skipIntro = sessionStorage.getItem('huIntroPlayed') === '1';
    let introSkipped = skipIntro;
    let progressTimer;

    // Slow auto-rotation of the globe while the loading screen is up
    let globeSpinning = true;
    function spinGlobe(timestamp) {
      if (!globeSpinning || introSkipped) return;
      const c = map.getCenter();
      map.jumpTo({ center: [c.lng + 0.35, c.lat], zoom: map.getZoom(), pitch: 0, bearing: 0 });
      requestAnimationFrame(spinGlobe);
    }
    if (!skipIntro) requestAnimationFrame(spinGlobe);

    // Keeps the globe turning for one full extra revolution, easing to a stop
    // exactly over a target — used so the earth is still visibly spinning
    // while it settles onto the first waypoint (Africa), instead of sitting still.
    function spinToTarget(targetCenter, targetZoom, duration, callback) {
      const startCenter = map.getCenter();
      const startLng = startCenter.lng;
      const startLat = startCenter.lat;
      const startZoom = map.getZoom();
      let delta = ((targetCenter[0] - startLng) % 360 + 360) % 360;
      delta += 360; // one extra full turn around the earth before settling
      const endLng = startLng + delta;
      const startTime = performance.now();
      function frame(now) {
        if (introSkipped) return;
        const t = Math.min(1, (now - startTime) / duration);
        const ease = 1 - Math.pow(1 - t, 3); // ease-out cubic
        map.jumpTo({
          center: [startLng + (endLng - startLng) * ease, startLat + (targetCenter[1] - startLat) * ease],
          zoom: startZoom + (targetZoom - startZoom) * ease,
          pitch: 0,
          bearing: 0
        });
        if (t < 1) { requestAnimationFrame(frame); }
        else if (callback) { callback(); }
      }
      requestAnimationFrame(frame);
    }

    // Types only the newly-added segment of the breadcrumb, keeping earlier
    // confirmed names static (e.g. "Africa, " already there, types "North Africa")
    function typeSegment(el, prefix, text, speed, cb) {
      let i = 0;
      const timer = setInterval(() => {
        if (introSkipped) { clearInterval(timer); return; }
        i++;
        el.textContent = prefix + text.slice(0, i);
        if (i >= text.length) { clearInterval(timer); if (cb) cb(); }
      }, speed);
    }

    function applyFinalMapTint() {
      map.setPaintProperty('tiles', 'raster-opacity', 0.4);
      map.setPaintProperty('tiles', 'raster-saturation', -0.3);
      map.setPaintProperty('tiles', 'raster-brightness-min', 0.1);
      if (map.getLayer('outside-mask')) map.setPaintProperty('outside-mask', 'fill-opacity', 0.9);
    }

    function runWaypoints(index, typedLabels) {
      if (introSkipped) return;

      if (index >= INTRO_WAYPOINTS.length) {
        startFinalApproach();
        return;
      }

      const waypoint = INTRO_WAYPOINTS[index];
      const crumbEl = document.getElementById('welcome-crumb');
      const overlay = document.getElementById('welcome-overlay');
      const prefix = typedLabels.length ? typedLabels.join(', ') + ', ' : '';

      overlay.classList.remove('fade-out');
      overlay.classList.add('visible');

      const travelDone = () => {
        if (introSkipped) return;
        typeSegment(crumbEl, prefix, waypoint.label, 65, () => {
          if (introSkipped) return;
          const nextLabels = typedLabels.concat(waypoint.label);
          setTimeout(() => {
            if (introSkipped) return;
            if (index === INTRO_WAYPOINTS.length - 1) applyFinalMapTint();
            runWaypoints(index + 1, nextLabels);
          }, waypoint.wait);
        });
      };

      if (index === 0) {
        spinToTarget(waypoint.center, waypoint.zoom, waypoint.duration, travelDone);
        return;
      }

      map.flyTo({
        center: waypoint.center,
        zoom: waypoint.zoom ?? getCampusZoom(),
        pitch: waypoint.pitch,
        bearing: waypoint.bearing,
        duration: waypoint.duration,
        padding: index === INTRO_WAYPOINTS.length - 1 ? getCampusPadding() : { top: 0, bottom: 0, left: 0, right: 0 },
        curve: 1.25,
        speed: 0.7,
        essential: true,
        easing: easeInOutCubic
      });
      map.once('moveend', travelDone);
    }

    // Typewriter effect for the "Welcome to Horus University" intro line
    function typeWelcome(text, callback) {
      const el = document.getElementById('welcome-typed');
      const overlay = document.getElementById('welcome-overlay');
      el.textContent = '';
      overlay.classList.add('visible');
      let i = 0;
      const timer = setInterval(() => {
        if (introSkipped) { clearInterval(timer); return; }
        i++;
        el.textContent = text.slice(0, i);
        if (i >= text.length) {
          clearInterval(timer);
          overlay.classList.add('sub-visible');
          setTimeout(() => {
            overlay.classList.remove('visible');
            overlay.classList.add('fade-out');
            setTimeout(() => { if (callback) callback(); }, 1200);
          }, 1900);
        }
      }, 150);
    }

    function startFinalApproach() {
      if (introSkipped) return;
      typeWelcome('Welcome to Horus University', () => {
        if (introSkipped) return;

        droneWrap.classList.remove('welcome-hover-bob', 'welcome-beacon');

        applyFinalMapTint();
        map.easeTo({
          center: CAMPUS_CENTER,
          zoom: getCampusZoom(),
          pitch: 55,
          bearing: -20,
          padding: getCampusPadding(),
          duration: 1400,
          easing: t => t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2
        });

        const speedLines = droneWrap.querySelector('#drone-speed-lines');
        if (speedLines) speedLines.style.opacity = '0';
        droneWrap.querySelectorAll('.rotor').forEach(r => r.style.animationDuration = '0.1s');
        droneWrap.style.transition = 'top 3.2s cubic-bezier(.4,0,.2,1), left 3.2s cubic-bezier(.4,0,.2,1), transform 3.2s cubic-bezier(.4,0,.2,1)';
        droneWrap.style.top = '32%';
        droneWrap.style.transform = 'translate(-50%, -50%) scale(0.85)';

        setTimeout(() => {
          if (introSkipped) return;
          const speedLines2 = droneWrap.querySelector('#drone-speed-lines');
          if (speedLines2) speedLines2.style.opacity = '0';
          droneWrap.style.transition = 'top 5.5s cubic-bezier(.4,0,.2,1), left 5.5s cubic-bezier(.4,0,.2,1), transform 5.5s cubic-bezier(.4,0,.2,1)';
          droneWrap.style.left = (window.innerWidth - 130 - 72) + 'px';
          droneWrap.style.top = '72px';
          droneWrap.style.transform = 'scale(1)';

          setTimeout(() => {
            if (introSkipped) return;
            droneWrap.style.transition = 'none';
            droneWrap.style.right = '72px';
            droneWrap.style.left = 'auto';
            droneWrap.style.top = '72px';
            droneWrap.style.transform = '';
            droneWrap.style.animation = '';
            droneWrap.querySelectorAll('.rotor').forEach(r => r.style.animationDuration = '');
            void droneWrap.offsetWidth;
            droneWrap.classList.add('hovering');
            // restore the base transition string used for building fly-tos
            droneWrap.style.transition = 'top 4.2s cubic-bezier(.4,0,.2,1), left 4.2s cubic-bezier(.4,0,.2,1), right 0.1s';
          }, 5700);
        }, 1600);
      });
    }

    const loadBar = document.getElementById('load-bar');
    const loadStatus = document.getElementById('load-status');
    const steps = [
      [20, 'Configuring HUE Vector Space…'],
      [50, 'Projecting Structural Elements…'],
      [85, 'Finalizing Texture Assemblies…'],
      [100, 'System Operational']

    progressTimer = setInterval(() => {
      if (introSkipped) { clearInterval(progressTimer); return; }
      if (stepIdx < steps.length) {
        loadBar.style.width = steps[stepIdx] + '%';
        loadStatus.textContent = steps[stepIdx];
        stepIdx++;
      } else {
        clearInterval(progressTimer);
        sessionStorage.setItem('huIntroPlayed', '1');
        setTimeout(() => {
          if (introSkipped) return;
          document.getElementById('loading').classList.add('fade-out');

            setTimeout(() => droneWrap.classList.add('welcome-hover-bob'), 1400);

    map.addLayer({ id:'outside-mask', type:'fill', source:'world-mask', paint:{ 'fill-color':'#030f1e', 'fill-opacity':0 } });

      'fill-extrusion-base':['get','minHeight'],

    }});

      'fill-extrusion-color':['get','roofColor'],

    map.addLayer({ id:'bldg-labels', type:'symbol', source:'campus', layout:{

    // Add drone to the map container (not the map canvas)
    document.getElementById('map').appendChild(droneWrap);

    // Click → open website
    droneWrap.addEventListener('click', () => window.open('https://horus.edu.eg/electronic-services-and-scientific-innovation-essic/', '_blank'));

    // Snap straight to the settled campus view — used for returning visitors
    // (session-skipped intro) and for the manual "Skip intro" button.
    function goToFinalState() {
      introSkipped = true;
      globeSpinning = false;
      if (progressTimer) clearInterval(progressTimer);

      document.getElementById('loading').classList.add('fade-out');
      const overlay = document.getElementById('welcome-overlay');
      overlay.classList.remove('visible', 'sub-visible');
      overlay.classList.add('fade-out');

      map.jumpTo({
        center: CAMPUS_CENTER,
        zoom: getCampusZoom(),
        pitch: 55,
        bearing: -20,
        padding: getCampusPadding()
      });
      applyFinalMapTint();

      droneWrap.classList.remove('welcome-hover-bob', 'welcome-beacon', 'orbiting-building', 'flying-to-building');
      droneWrap.style.transition = 'none';
      droneWrap.style.animation = '';
      droneWrap.style.right = '72px';
      droneWrap.style.left = 'auto';
      droneWrap.style.top = '72px';
      droneWrap.style.transform = '';
      droneWrap.style.opacity = '1';
      droneWrap.querySelectorAll('.rotor').forEach(r => r.style.animationDuration = '');
      const speedLines = droneWrap.querySelector('#drone-speed-lines');
      if (speedLines) speedLines.style.opacity = '0';
      void droneWrap.offsetWidth;
      droneWrap.classList.add('hovering');
      droneWrap.style.transition = 'top 4.2s cubic-bezier(.4,0,.2,1), left 4.2s cubic-bezier(.4,0,.2,1), right 0.1s';

      const skipBtn = document.getElementById('intro-skip-btn');
      if (skipBtn) skipBtn.classList.remove('show');
    }

    const skipBtn = document.getElementById('intro-skip-btn');
    if (skipBtn) skipBtn.addEventListener('click', goToFinalState);

    if (skipIntro) goToFinalState();

    // Animate drone when flying to a building
    const _origFlyTo = flyTo;

    // Track drone's current "home" position for return
    const DRONE_HOME = { top: 72, right: 72 };

    function triggerDroneFly(buildingId) {
      const droneEl = droneWrap;

      // --- Phase 1: lift off and fly toward the building ---
      droneEl.classList.remove('hovering', 'orbiting-building', 'flying-to-building');
      droneEl.style.transition = 'none';

      // Speed up rotors for takeoff
      droneEl.querySelectorAll('.rotor').forEach(r => r.style.animationDuration = '0.07s');

      // Get building screen position via map project
      let destX = window.innerWidth / 2;
      let destY = window.innerHeight / 2;

      if (buildingId && COORDS[buildingId]) {
        try {
          const [lng, lat] = getCentroid(COORDS[buildingId][0]);
          // project after a short delay so flyTo has started moving
          setTimeout(() => {
            const pt = map.project([lng, lat]);
            destX = pt.x;
            destY = pt.y;
          }, 600);
        } catch(e) {}
      }

      // Begin flight animation class
      void droneEl.offsetWidth; // force reflow
      droneEl.classList.add('flying-to-building');

      // After 1s, re-enable position transition and move drone toward building
      setTimeout(() => {
        // Get screen coords of building (after map has moved a bit)
        let targetLeft = destX, targetTop = destY;
        if (buildingId && COORDS[buildingId]) {
          try {
            const [lng, lat] = getCentroid(COORDS[buildingId][0]);
            const pt = map.project([lng, lat]);
            targetLeft = pt.x - 55; // center drone over building
            targetTop  = pt.y - 36;
          } catch(e) {}
        }

        // Clamp to viewport
        targetLeft = Math.max(20, Math.min(window.innerWidth - 130, targetLeft));
        targetTop  = Math.max(20, Math.min(window.innerHeight - 100, targetTop));

        droneEl.style.transition = 'top 3.4s cubic-bezier(.4,0,.2,1), left 3.4s cubic-bezier(.4,0,.2,1)';
        droneEl.style.right = 'auto';
        droneEl.style.left = targetLeft + 'px';
        droneEl.style.top  = targetTop  + 'px';
      }, 900);

      // Phase 2: arrive → switch to orbit bob over building
      setTimeout(() => {
        droneEl.classList.remove('flying-to-building');
        droneEl.classList.add('orbiting-building');
        droneEl.querySelectorAll('.rotor').forEach(r => r.style.animationDuration = '0.14s');
      }, 4600);

      // Phase 3: orbit for ~12s, then return home
      setTimeout(() => {
        zoomOutAfterBuildingOrbit(map, buildingId);
        droneEl.classList.remove('orbiting-building');
        droneEl.classList.add('flying-to-building');
        droneEl.querySelectorAll('.rotor').forEach(r => r.style.animationDuration = '0.07s');

        // Fly back to home position (top-right corner)
        setTimeout(() => {
          droneEl.style.transition = 'top 3.2s cubic-bezier(.4,0,.2,1), left 3.2s cubic-bezier(.4,0,.2,1), right 3.2s';
          droneEl.style.left  = (window.innerWidth - 130 - DRONE_HOME.right) + 'px';
          droneEl.style.top   = DRONE_HOME.top + 'px';
        }, 600);

        // Land back home
        setTimeout(() => {
          droneEl.classList.remove('flying-to-building');
          droneEl.style.transition = 'none';
          droneEl.style.right = DRONE_HOME.right + 'px';
          droneEl.style.left  = 'auto';
          droneEl.style.top   = DRONE_HOME.top + 'px';
          droneEl.querySelectorAll('.rotor').forEach(r => r.style.animationDuration = '');
          void droneEl.offsetWidth;
          droneEl.classList.add('hovering');
        }, 4000);

      }, 17000); // stay orbiting for ~12 seconds
    }

    // Expose triggerDroneFly globally with building id
    window.triggerDroneFly = triggerDroneFly;

    // Search Engine Filter
    document.getElementById('search-input').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const matching = BUILDINGS.filter(b => b.name.toLowerCase().includes(term) || b.depts.toLowerCase().includes(term));
      renderDirectoryList(map, matching);
    });

    map.on('move', () => {
      const center = map.getCenter();
      document.getElementById('hud-lat').textContent = center.lat.toFixed(4);
      document.getElementById('hud-lng').textContent = center.lng.toFixed(4);
    });

    const hoverTip = document.getElementById('hover-tip');
    ['bldg-walls','bldg-roof'].forEach(layer => {
      map.on('mousemove', layer, e => {
        map.getCanvas().style.cursor = 'pointer';
        const b = BUILDINGS[e.features[0].id];
        if (!b) return;
        document.getElementById('ht-name').textContent = b.name;
        hoverTip.style.display = 'block';
        hoverTip.style.left = (e.point.x + 12) + 'px';
        hoverTip.style.top = (e.point.y - 45) + 'px';
      });

      map.on('mouseleave', layer, () => {
        map.getCanvas().style.cursor = '';
        hoverTip.style.display = 'none';
      });

      map.on('click', layer, e => {
        const b = BUILDINGS[e.features[0].id];
        if (b) { flyTo(map, b.id); showPopup(b); window.triggerDroneFly && window.triggerDroneFly(b.id); }
      });
    });

    document.getElementById('drawer-open-btn').addEventListener('click', () => {
      document.getElementById('side-drawer').classList.add('open');
    });
    document.getElementById('drawer-close-btn').addEventListener('click', () => {
      document.getElementById('side-drawer').classList.remove('open');
    });
    document.getElementById('pop-close').addEventListener('click', () => {
      document.getElementById('popup').style.display = 'none';
      resetView(map);
    });
    document.getElementById('pop-fly-btn').addEventListener('click', () => {
      if (currentPopupId) { flyTo(map, currentPopupId); window.triggerDroneFly && window.triggerDroneFly(currentPopupId); }
    });
    document.getElementById('pop-web-btn').addEventListener('click', () => {
      window.open(currentLinkTarget, '_blank');
    });

    document.getElementById('btn-3d').addEventListener('click', () => {
      is3D = !is3D;
      map.easeTo({ pitch: is3D ? 50 : 0, bearing: is3D ? -60 : 0, duration: 1000 });
      document.getElementById('btn-3d').textContent = is3D ? '2D' : '3D';
    });
    document.getElementById('btn-reset').addEventListener('click', () => {
      document.getElementById('popup').style.display = 'none';
      resetView(map);
    });
    document.getElementById('btn-zoomin').addEventListener('click', () => map.zoomIn());
    document.getElementById('btn-zoomout').addEventListener('click', () => map.zoomOut());
  });
});
</script>
</body>
</html>
